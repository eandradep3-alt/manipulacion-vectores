<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios con Vectores Numericos</title>
    <style>
        table td {
            text-align: center;
        }
    </style>
</head>

<body>
    <h4>Ejercicio con Vectores</h4>
    <div>
        <table>
            <tbody>
                <tr>
                    <td>Dimension del arreglo:</td>
                    <td>
                        <select id="select-dimension-arreglo">
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                            <option value="25">25</option>
                            <option value="30">30</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Ingrese valor a buscar:</td>
                    <td><input type="text" id="id-valor-busqueda" maxlength="4" size="5"></td>
                </tr>
            </tbody>
        </table>
    </div>
    <br>
<div style="overflow-x: auto;">
    <table id="id-table-vector-numerico" border="1" cellspacing="1" cellpadding="1">
        <thead>
            <tr>
                <td colspan="30">Vector numerico de N elementos</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>0</td><td>1</td><td>2</td><td>3</td><td>4</td>
                <td>5</td><td>6</td><td>7</td><td>8</td><td>9</td>
            </tr>
            <tr>
                <td>0</td><td>0</td><td>0</td><td>0</td><td>0</td>
                <td>0</td><td>0</td><td>0</td><td>0</td><td>0</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="5"><button id="btn-cargar-vector">Cargar Vector</button></td>
                <td colspan="5"><button id="btn-vaciar-vector">Vaciar Vector</button></td>
            </tr>
            <tr>
                <td colspan="10"><button id="btn-presentar-vector">Presentar Vector</button></td>
            </tr>
            <!-- Botones nuevos -->
            <tr>
                <td colspan="5"><button id="btn-valor-minimo">Valor Mínimo</button></td>
                <td colspan="5"><button id="btn-valor-maximo">Valor Máximo</button></td>
            </tr>
            <tr>
                <td colspan="5"><button id="btn-suma-total">Suma Total</button></td>
                <td colspan="5"><button id="btn-producto-total">Producto Total</button></td>
            </tr>
            <tr>
                <td colspan="5"> <button id="btn-media"> Media</button></td>
                <td colspan="5"> <button id="btn-mediana"> Mediana</button></td>
            </tr>
            <tr>
                <td colspan="10"> <button id="btn-moda"> Moda</button></td>
            </tr>
            <tr>
                <td colspan="10"> Métodos de ordenamiento
                    <br><br>
                Tipo de ordenamiento
                <select id="tipo-orden">
            <option value="asc">Ascendente</option>
            <option value="desc">Descendente</option>
        </select>
        <br><br>
             <button id="btn-ordenamiento-select">Ordenamiento Selección</button>
               <button id="btn-ordenamiento-burbuja">Ordenamiento Burbuja</button>
               </td>
            </tr>
        </tfoot>
    </table>
</div>
    <hr>
    <table>
        <thead>
            <tr>
                <td colspan="2">Cálculos con vectores</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Resultado:</td>
                <td colspan="2"><input type="text" id="resultado" size="70"></td>
            </tr>
        </tbody>
    </table>
    <script type="module" src="./JS/App.js"></script>
</body>
</html>
